<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="author" content="Muhamad Nauval Azhar">
	<meta name="viewport" content="width=device-width,initial-scale=1">
	<meta name="description" content="This is a login page template based on Bootstrap 5">
	<title>Bootstrap 5 Login Page</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-BmbxuPwQa2lc/FVzBcNJ7UAyJxM6wuqIj61tLrc4wSX0szH/Ev+nYRRuWlolflfl" crossorigin="anonymous">
</head>

<body>
	<section class="h-100">
		<div class="container h-100">
			<div class="row justify-content-sm-center h-100">
				<div class="col-xxl-4 col-xl-5 col-lg-5 col-md-7 col-sm-9">
					<div class="text-center my-5">
						<img src="https://getbootstrap.com/docs/5.0/assets/brand/bootstrap-logo.svg" alt="logo" width="100">
					</div>
					<div class="card shadow-lg">
						<div class="card-body p-5">
							<h1 class="fs-4 card-title fw-bold mb-4">Login</h1>
							
							<form id="loginForm">
								 <h3>Silahkan Login</h3>
                                 <label for="username">Nama Pengguna</label>
                                 <input type="text" id="username" placeholder="Nama Pengguna.." required="required">

                                 <label for="password">Password</label>
								 <input type="password" id="password" placeholder="Password.." required="required">
								 <!-- <p id="message"></p> -->
                                 <button type="submit" >masuk</button>

                                 <div class="social">
								  <div class="go"> <a href="register.html">DAFTAR </a></div>
                                  <div class="kanan"><i class="fab fa-google"></i> Google</div>
                                </div>
                                <button onclick="location.href='../index.html';">Home</button>
                                <div id="alertBox" class="alert" style="display:none;"></div>
							</form>
						</div>
						<div class="card-footer py-3 border-0">
							<div class="text-center">
								Don't have an account? <a href="register.html" class="text-dark">Create One</a>
							</div>
						</div>
					</div>
					<div class="text-center mt-5 text-muted">
						Copyright &copy; 2017-2021 &mdash; Your Company 
					</div>
				</div>
			</div>
		</div>
	</section>
     <div id="alertBox" class="alert" style="display:none;"></div>
 </form>
	     
	<script src="js/login.js"></script>
	<script src="js/register.js" defer></script>
</body>
</html>
